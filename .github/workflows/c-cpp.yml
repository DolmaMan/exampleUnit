name: Windows CI/CD with artifacts and releases

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Create build directory
        run: mkdir build

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
      
      - name: Build with MSBuild
        run: msbuild ExampleUnit.sln -p:Configuration=Release
        
      - name: Run tests
        working-directory: build
        run: ctest -C Release --output-on-failure --test-output-size-passed 1024
        continue-on-error: true

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: build/Testing/Temporary/
          retention-days: 30

      - name: Prepare artifacts
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Copy-Item -Path build/Release/*.exe -Destination artifacts/ -ErrorAction SilentlyContinue
          Copy-Item -Path build/Release/*.dll -Destination artifacts/ -ErrorAction SilentlyContinue
          Copy-Item -Path build/Release/*.pdb -Destination artifacts/ -ErrorAction SilentlyContinue

      - name: Create archive
        shell: powershell
        run: |
          Compress-Archive -Path artifacts/* -DestinationPath project-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries-${{ github.run_id }}
          path: project-windows.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: project-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
